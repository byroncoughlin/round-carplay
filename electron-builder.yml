appId: com.electron.app
productName: motoCarPlay

directories:
  buildResources: assets

files:
  - '!src/*'
  - '!**/.vscode/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

asarUnpack:
  - resources/**
  - node_modules/usb/**

linux:
  target:
    - AppImage
  icon: icons/linux/pi-carplay.png   
  maintainer: "Lasse Heitgres <hello@f-io.dev>"
  category: Utility

mac:
  icon: icons/mac/pi-carplay.icns
  category: public.app-category.utilities
  extendInfo:
    NSCameraUsageDescription: motoCarPlay requires camera access for CarPlay.
    NSMicrophoneUsageDescription: motoCarPlay requires microphone access for voice control.
    NSDocumentsFolderUsageDescription: motoCarPlay requires access to documents.
    NSDownloadsFolderUsageDescription: motoCarPlay requires access to downloads.
    
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}

appImage:
  artifactName: ${name}-${version}-${arch}.${ext}

# Cross-building the Linux arm64 AppImage from a macOS host: do NOT rebuild
# native modules for the host. `usb` ships a valid linux-arm64 prebuilt
# (node_modules/usb/prebuilds/linux-arm64/node.napi.armv8.node, an ELF aarch64
# binary) and node-gyp-build selects it at runtime on the Pi. Rebuilding here
# would produce a macOS Mach-O .node in build/Release that gets packaged and
# fails on the Pi with "invalid ELF header".
npmRebuild: false

publish:
  provider: generic
  url: "https://f-io.github.io/pi-carplay/releases/"
