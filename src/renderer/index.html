<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width"/>
    <meta name="theme-color" content="#000000" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <title>pi-carplay</title>
    <style>
      html, body, #root, #main, #videoContainer {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #000000;
      }
      /* Instant boot splash — visible the moment the window paints, before the
         JS bundle loads. main.tsx fades it out once the dashboard is ready. */
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: #000000;
        opacity: 1; transition: opacity 600ms ease;
        -webkit-user-select: none; user-select: none;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash svg { width: 64vmin; height: 64vmin; animation: splashPulse 1.8s ease-in-out infinite; }
      @keyframes splashPulse { 0%,100% { opacity: .6 } 50% { opacity: 1 } }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" fill="none">
        <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="240" cy="240" r="216" stroke-width="3" opacity="0.55"/>
          <circle cx="240" cy="240" r="206" stroke-width="1.5" opacity="0.30"/>
          <line x1="66" y1="212" x2="414" y2="212" stroke-width="3" opacity="0.6"/>
          <circle cx="240" cy="212" r="40" stroke-width="5"/>
          <circle cx="240" cy="212" r="9" fill="#ffffff" stroke="none"/>
          <rect x="80" y="180" width="118" height="64" rx="9" stroke-width="5"/>
          <g stroke-width="3" opacity="0.85">
            <line x1="100" y1="180" x2="100" y2="244"/><line x1="118" y1="180" x2="118" y2="244"/>
            <line x1="136" y1="180" x2="136" y2="244"/><line x1="154" y1="180" x2="154" y2="244"/>
            <line x1="172" y1="180" x2="172" y2="244"/>
          </g>
          <rect x="66" y="192" width="18" height="40" rx="5" stroke-width="5"/>
          <rect x="282" y="180" width="118" height="64" rx="9" stroke-width="5"/>
          <g stroke-width="3" opacity="0.85">
            <line x1="308" y1="180" x2="308" y2="244"/><line x1="326" y1="180" x2="326" y2="244"/>
            <line x1="344" y1="180" x2="344" y2="244"/><line x1="362" y1="180" x2="362" y2="244"/>
            <line x1="380" y1="180" x2="380" y2="244"/>
          </g>
          <rect x="396" y="192" width="18" height="40" rx="5" stroke-width="5"/>
        </g>
        <text x="240" y="330" text-anchor="middle" fill="#ffffff"
              font-family="'Roboto','Helvetica Neue',sans-serif" font-size="62"
              font-weight="700" letter-spacing="6">R75/6</text>
        <text x="240" y="366" text-anchor="middle" fill="#ffffff" opacity="0.6"
              font-family="'Roboto','Helvetica Neue',sans-serif" font-size="19"
              font-weight="500" letter-spacing="13">AIRHEAD</text>
      </svg>
    </div>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
